<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — LUMIÈRE PROPIEDADES</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --black: #0A0A0A;
  --dark: #111111;
  --dark-2: #1A1A1A;
  --dark-3: #242424;
  --gray: #6B6B6B;
  --white: #FAFAF8;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Jost', sans-serif;
  --error: #e05252;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--dark);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* Background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 20%, rgba(201,168,76,0.04) 0%, transparent 50%),
    var(--dark);
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A84C' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  z-index: 0;
  opacity: 0.5;
}

.login-card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  margin: 2rem;
  animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-header {
  text-align: center;
  margin-bottom: 2.5rem;
}

.login-logo {
  font-family: var(--font-display);
  font-size: 1.7rem;
  font-weight: 400;
  letter-spacing: 0.14em;
  color: var(--white);
}
.login-logo span { color: var(--gold); }

.login-subtitle {
  margin-top: 0.5rem;
  font-size: 0.62rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gray);
}

.login-box {
  background: var(--dark-2);
  border: 1px solid var(--dark-3);
  padding: 2.5rem;
  position: relative;
}

.login-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.form-group {
  margin-bottom: 1.5rem;
}

.form-group label {
  display: block;
  font-size: 0.56rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.6rem;
}

.form-group input {
  width: 100%;
  background: var(--dark-3);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--white);
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 300;
  padding: 0.8rem 1rem;
  outline: none;
  transition: border-color 0.25s;
}

.form-group input:focus {
  border-color: var(--gold);
}

.form-group input::placeholder {
  color: var(--gray);
}

.login-btn {
  width: 100%;
  padding: 0.9rem;
  background: var(--gold);
  color: var(--black);
  border: none;
  font-family: var(--font-body);
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.25s;
  margin-top: 0.5rem;
}

.login-btn:hover { background: var(--gold-light); }

.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.error-msg {
  display: none;
  background: rgba(224,82,82,0.1);
  border: 1px solid rgba(224,82,82,0.3);
  color: #e05252;
  font-size: 0.75rem;
  padding: 0.65rem 0.9rem;
  margin-bottom: 1.2rem;
  text-align: center;
}
.error-msg.show { display: block; }

.login-footer {
  text-align: center;
  margin-top: 1.5rem;
  font-size: 0.62rem;
  color: var(--gray);
  letter-spacing: 0.1em;
}

.loading-spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: var(--black);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.lock-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 52px; height: 52px;
  border: 1px solid var(--dark-3);
  margin: 0 auto 1.5rem;
}
.lock-icon svg { stroke: var(--gold); }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <div class="lock-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <p class="login-logo">LUMIÈRE <span>·</span> PROPIEDADES</p>
    <p class="login-subtitle">Panel de Administración</p>
  </div>

  <div class="login-box">
    <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos.</div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="username">
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="login-btn" id="loginBtn" onclick="handleLogin()">
      <span id="btnText">Iniciar sesión</span>
      <div class="loading-spinner" id="spinner"></div>
    </button>
  </div>

  <p class="login-footer">Acceso exclusivo para administradores</p>
</div>

<script>
// ── CONFIGURATION ──
// Contraseña hasheada con SHA-256
// Usuario: admin  |  Contraseña: Lumiere2025#
// Para cambiar, genera el hash con: https://emn178.github.io/online-tools/sha256.html
const ADMIN_USER = 'admin';
const ADMIN_PASS_HASH = 'a665a45920422f9d417e4867efdc4fb8a04a1f3fff1fa07e998e86f7f7a27ae3'; // hash de "123" para demo

// Función de hash SHA-256 usando Web Crypto API
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// Chequear si ya está logueado
(function checkAuth() {
  const session = getSession();
  if (session) {
    window.location.href = './dashboard.html';
  }
})();

function getSession() {
  try {
    const s = sessionStorage.getItem('lumiere_admin');
    if (!s) return null;
    const data = JSON.parse(s);
    if (data.expires < Date.now()) {
      sessionStorage.removeItem('lumiere_admin');
      return null;
    }
    return data;
  } catch { return null; }
}

async function handleLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errMsg = document.getElementById('errorMsg');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');

  if (!user || !pass) {
    showError('Por favor ingresa usuario y contraseña.');
    return;
  }

  // UI loading state
  btn.disabled = true;
  btnText.style.display = 'none';
  spinner.style.display = 'block';
  errMsg.classList.remove('show');

  // Simular latencia de red
  await new Promise(r => setTimeout(r, 600));

  try {
    const passHash = await sha256(pass);
    if (user === ADMIN_USER && passHash === ADMIN_PASS_HASH) {
      // Crear sesión por 8 horas
      const session = {
        user: ADMIN_USER,
        expires: Date.now() + (8 * 60 * 60 * 1000),
        token: crypto.randomUUID()
      };
      sessionStorage.setItem('lumiere_admin', JSON.stringify(session));
      window.location.href = './dashboard.html';
    } else {
      showError('Usuario o contraseña incorrectos.');
    }
  } catch (e) {
    showError('Error al autenticar. Intenta de nuevo.');
  }

  btn.disabled = false;
  btnText.style.display = 'block';
  spinner.style.display = 'none';
}

function showError(msg) {
  const errMsg = document.getElementById('errorMsg');
  errMsg.textContent = msg;
  errMsg.classList.add('show');
  setTimeout(() => errMsg.classList.remove('show'), 5000);
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
